name: Scala CI

on: [push, pull_request]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        java: [8, 25]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
    - uses: actions/checkout@v6
    - name: Set up JDK
      uses: actions/setup-java@v5
      with:
        java-version: ${{matrix.java}}
        distribution: 'zulu'
    - name: Make sbt wrapper executable
      run: chmod +x ./sbt        
    - name: Run tests
      run: ./sbt scalafmtSbtCheck "+ scalafmtCheckAll" +test
